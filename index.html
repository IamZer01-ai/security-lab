<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberSecurityA1 Lab</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
}

header{
    background:#0a0a0a;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #00ff88;
}

nav{
    background:#161616;
    padding:10px;
    text-align:center;
}

nav a{
    color:#00ff88;
    margin:15px;
    text-decoration:none;
}

.container{
    padding:30px;
}

.card{
    background:#1b1b1b;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#00ff88;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>CyberSecurityA1 Training Lab</h1>
<p>Personal Security Learning Environment</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Profile</a>
<a href="#">Search</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="card">
<h2>Login Portal</h2>

<form>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button type="submit">Login</button>
</form>

</div>

<div class="card">
<h2>Search Users</h2>

<input type="text" placeholder="Search username">

</div>

<div class="card">
<h2>User Profile</h2>

<p>Name: Jai</p>
<p>Role: Security Student</p>
<p>Status: Learning Web Security</p>

</div>

<div class="card">
<h2>Contact Form</h2>

<form>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Message">
<button type="submit">Send</button>
</form>

</div>

</div>

</body>
</html>
